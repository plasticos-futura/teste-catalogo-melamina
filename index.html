<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melamina Catalogue</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
margin:0;
background:#e5e5e5;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#controls{
position:fixed;
bottom:25px;
display:flex;
gap:10px;
z-index:1000;
}

button{
background:white;
border:1px solid #ccc;
padding:10px 14px;
font-size:16px;
border-radius:6px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

button:hover{
background:#f3f3f3;
}

#container{
display:flex;
justify-content:center;
align-items:center;
width:100%;
height:100%;
}

#book{
width:1000px;
height:700px;
}

.page{
background:white;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

</style>

</head>

<body>

<div id="container">

<div id="book"></div>

</div>

<div id="controls">

<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>

<button onclick="zoomIn()">＋</button>
<button onclick="zoomOut()">－</button>

<button onclick="toggleFullscreen()">⛶</button>

</div>

<script>

const pages = [

"page1.jpg",
"page2.jpg",
"page3.jpg",
"page4.jpg",
"page5.jpg",
"page6.jpg",
"page7.jpg",
"page8.jpg",
"page9.jpg",
"page10.jpg",
"page11.jpg",
"page12.jpg",
"page13.jpg",
"page14.jpg",
"page15.jpg",
"page16.jpg",
"page17.jpg",
"page18.jpg",
"page19.jpg",
"page20.jpg",
"page21.jpg",
"page22.jpg",
"page23.jpg",
"page24.jpg"

];

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:500,
height:700,
size:"stretch",
minWidth:300,
maxWidth:1000,
minHeight:400,
maxHeight:1200,
maxShadowOpacity:0.5,
showCover:true,
mobileScrollSupport:true
}
);

pageFlip.loadFromImages(pages);

function nextPage(){
pageFlip.flipNext();
}

function prevPage(){
pageFlip.flipPrev();
}

let zoom=1;

function zoomIn(){
zoom+=0.1;
document.getElementById("book").style.transform="scale("+zoom+")";
}

function zoomOut(){
zoom-=0.1;
document.getElementById("book").style.transform="scale("+zoom+")";
}

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}

}

</script>

</body>

</html>
